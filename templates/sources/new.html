{% extends "base.html" %}

{% block title %}New Source - Blackholed{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold mb-6">Add New Source</h1>

        {% if error.is_some() %}
        <div class="mb-4 p-4 bg-red-50 border border-red-200 rounded">
            <p class="text-red-800">{{ error.as_ref().unwrap() }}</p>
        </div>
        {% endif %}

        <form method="post" action="/sources" class="space-y-4">
            <div>
                <label for="id" class="block text-sm font-medium text-gray-700 mb-2">
                    Source ID <span class="text-red-500">*</span>
                </label>
                <input
                    type="text"
                    id="id"
                    name="id"
                    required
                    pattern="[a-zA-Z0-9-]{1,64}"
                    class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="my-blocklist"
                />
                <p class="mt-1 text-sm text-gray-500">
                    1-64 alphanumeric characters and hyphens
                </p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Disposition <span class="text-red-500">*</span>
                </label>
                <div class="space-y-2">
                    <label class="inline-flex items-center">
                        <input
                            type="radio"
                            name="disposition"
                            value="Block"
                            checked
                            class="form-radio text-blue-600"
                        />
                        <span class="ml-2">Block - Deny access to these domains</span>
                    </label>
                    <br/>
                    <label class="inline-flex items-center">
                        <input
                            type="radio"
                            name="disposition"
                            value="Allow"
                            class="form-radio text-blue-600"
                        />
                        <span class="ml-2">Allow - Permit access to these domains</span>
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Source Type
                </label>
                <div class="space-y-2">
                    <label class="inline-flex items-center">
                        <input
                            type="radio"
                            name="source_type"
                            value="manual"
                            checked
                            class="form-radio text-blue-600"
                            onchange="toggleSourceFields()"
                        />
                        <span class="ml-2">Manual - Manage hosts manually</span>
                    </label>
                    <br/>
                    <label class="inline-flex items-center">
                        <input
                            type="radio"
                            name="source_type"
                            value="url"
                            class="form-radio text-blue-600"
                            onchange="toggleSourceFields()"
                        />
                        <span class="ml-2">URL - Automatically fetch from URL</span>
                    </label>
                    <br/>
                    <label class="inline-flex items-center">
                        <input
                            type="radio"
                            name="source_type"
                            value="file"
                            class="form-radio text-blue-600"
                            onchange="toggleSourceFields()"
                        />
                        <span class="ml-2">File - Load from local file</span>
                    </label>
                </div>
            </div>

            <div id="url-field" class="hidden">
                <label for="url" class="block text-sm font-medium text-gray-700 mb-2">
                    URL
                </label>
                <input
                    type="url"
                    id="url"
                    name="url"
                    class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="https://example.com/blocklist.txt"
                />
            </div>

            <div id="path-field" class="hidden">
                <label for="path" class="block text-sm font-medium text-gray-700 mb-2">
                    File Path
                </label>
                <input
                    type="text"
                    id="path"
                    name="path"
                    class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="/etc/blackholed/blocklist.txt"
                />
            </div>

            <div class="flex gap-2 pt-4">
                <button
                    type="submit"
                    class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition"
                >
                    Create Source
                </button>
                <a
                    href="/sources"
                    class="bg-gray-200 text-gray-700 px-4 py-2 rounded hover:bg-gray-300 transition"
                >
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
function toggleSourceFields() {
    const sourceType = document.querySelector('input[name="source_type"]:checked').value;
    const urlField = document.getElementById('url-field');
    const pathField = document.getElementById('path-field');
    const urlInput = document.getElementById('url');
    const pathInput = document.getElementById('path');

    if (sourceType === 'url') {
        urlField.classList.remove('hidden');
        pathField.classList.add('hidden');
        urlInput.required = true;
        pathInput.required = false;
        pathInput.value = '';
    } else if (sourceType === 'file') {
        urlField.classList.add('hidden');
        pathField.classList.remove('hidden');
        urlInput.required = false;
        pathInput.required = true;
        urlInput.value = '';
    } else {
        urlField.classList.add('hidden');
        pathField.classList.add('hidden');
        urlInput.required = false;
        pathInput.required = false;
        urlInput.value = '';
        pathInput.value = '';
    }
}
</script>
{% endblock %}
