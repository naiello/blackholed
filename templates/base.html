<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blackhole DNS{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/json-enc.js"></script>
    <script>
        // Dark mode initialization - runs immediately to prevent flash
        (function() {
            const stored = localStorage.getItem('blackhole-ui-theme');

            function applyTheme(isDark) {
                const html = document.documentElement;
                if (isDark) {
                    html.classList.add('dark');
                } else {
                    html.classList.remove('dark');
                }
            }

            // If user has a preference, use it; otherwise follow system
            if (stored) {
                applyTheme(stored === 'dark');
            } else {
                applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
            }

            // Listen for system theme changes only if user hasn't set a preference
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                if (!localStorage.getItem('blackhole-ui-theme')) {
                    applyTheme(e.matches);
                }
            });

            // Make current state available globally
            window.isDarkMode = function() {
                return document.documentElement.classList.contains('dark');
            };
        })();
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <nav class="bg-gray-800 dark:bg-gray-950 text-white shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-bold hover:text-gray-300 transition">Blackhole DNS</a>
                </div>
                <div class="hidden md:flex space-x-4">
                    <a href="/" class="px-3 py-2 rounded-md hover:bg-gray-700 dark:hover:bg-gray-600 transition">Dashboard</a>
                    <a href="/clients" class="px-3 py-2 rounded-md hover:bg-gray-700 dark:hover:bg-gray-600 transition">Clients</a>
                    <a href="/sources" class="px-3 py-2 rounded-md hover:bg-gray-700 dark:hover:bg-gray-600 transition">Sources</a>
                </div>
                <div class="flex items-center gap-4">
                    <button id="theme-toggle" class="p-2 rounded-md hover:bg-gray-700 dark:hover:bg-gray-600 transition" aria-label="Toggle theme">
                        <svg id="theme-icon-light" class="hidden h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
                        </svg>
                        <svg id="theme-icon-dark" class="hidden h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
                        </svg>
                    </button>
                    <div class="md:hidden">
                    <button id="mobile-menu-button" class="text-gray-300 dark:text-gray-400 hover:text-white focus:outline-none">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>
            </div>
            </div>
            <div id="mobile-menu" class="hidden md:hidden pb-4">
                <a href="/" class="block px-3 py-2 rounded-md hover:bg-gray-700 dark:hover:bg-gray-600 transition">Dashboard</a>
                <a href="/clients" class="block px-3 py-2 rounded-md hover:bg-gray-700 dark:hover:bg-gray-600 transition">Clients</a>
                <a href="/sources" class="block px-3 py-2 rounded-md hover:bg-gray-700 dark:hover:bg-gray-600 transition">Sources</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Simple mobile menu toggle
        document.getElementById('mobile-menu-button')?.addEventListener('click', function() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        });

        // Theme toggle functionality
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('theme-toggle');
            const lightIcon = document.getElementById('theme-icon-light');
            const darkIcon = document.getElementById('theme-icon-dark');

            function updateIcon() {
                const isDark = window.isDarkMode();
                lightIcon.classList.toggle('hidden', !isDark);
                darkIcon.classList.toggle('hidden', isDark);
            }

            function toggleTheme() {
                const isDark = window.isDarkMode();
                const newTheme = isDark ? 'light' : 'dark';

                localStorage.setItem('blackhole-ui-theme', newTheme);
                document.documentElement.classList.toggle('dark', newTheme === 'dark');
                updateIcon();
            }

            toggle.addEventListener('click', toggleTheme);
            updateIcon();
        });

        // Format past timestamps (e.g., "2 hours ago")
        function formatPastTime(diffSec) {
            if (diffSec < 10) {
                return 'just now';
            } else if (diffSec < 60) {
                return `${diffSec} seconds ago`;
            } else if (diffSec < 3600) {
                const minutes = Math.floor(diffSec / 60);
                return minutes === 1 ? '1 minute ago' : `${minutes} minutes ago`;
            } else if (diffSec < 86400) {
                const hours = Math.floor(diffSec / 3600);
                return hours === 1 ? '1 hour ago' : `${hours} hours ago`;
            } else if (diffSec < 2592000) {
                const days = Math.floor(diffSec / 86400);
                return days === 1 ? '1 day ago' : `${days} days ago`;
            } else if (diffSec < 31536000) {
                const months = Math.floor(diffSec / 2592000);
                return months === 1 ? '1 month ago' : `${months} months ago`;
            } else {
                const years = Math.floor(diffSec / 31536000);
                return years === 1 ? '1 year ago' : `${years} years ago`;
            }
        }

        // Format future timestamps (e.g., "in 2 hours")
        function formatFutureTime(diffSec) {
            // Check for >1000 years in the future (indefinite)
            if (diffSec > 31536000000) {
                return 'never';
            } else if (diffSec < 10) {
                return 'in a few seconds';
            } else if (diffSec < 60) {
                return `in ${diffSec} seconds`;
            } else if (diffSec < 3600) {
                const minutes = Math.floor(diffSec / 60);
                return minutes === 1 ? 'in 1 minute' : `in ${minutes} minutes`;
            } else if (diffSec < 86400) {
                const hours = Math.floor(diffSec / 3600);
                return hours === 1 ? 'in 1 hour' : `in ${hours} hours`;
            } else if (diffSec < 2592000) {
                const days = Math.floor(diffSec / 86400);
                return days === 1 ? 'in 1 day' : `in ${days} days`;
            } else if (diffSec < 31536000) {
                const months = Math.floor(diffSec / 2592000);
                return months === 1 ? 'in 1 month' : `in ${months} months`;
            } else {
                const years = Math.floor(diffSec / 31536000);
                return years === 1 ? 'in 1 year' : `in ${years} years`;
            }
        }

        // Convert UTC timestamps to relative time format
        function convertTimestampsToLocal() {
            const timeElements = document.querySelectorAll('time.local-time');
            timeElements.forEach(function(element) {
                const utcTime = element.getAttribute('datetime');
                if (utcTime) {
                    const date = new Date(utcTime);
                    const now = new Date();
                    const diffMs = date - now;
                    const diffSec = Math.floor(Math.abs(diffMs) / 1000);

                    // Format exact date for title attribute
                    const year = date.getFullYear();
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const day = String(date.getDate()).padStart(2, '0');
                    const hours = String(date.getHours()).padStart(2, '0');
                    const minutes = String(date.getMinutes()).padStart(2, '0');
                    const seconds = String(date.getSeconds()).padStart(2, '0');
                    const timezone = new Intl.DateTimeFormat('en', { timeZoneName: 'short' })
                        .formatToParts(date)
                        .find(part => part.type === 'timeZoneName')?.value || '';
                    const exactDate = `${year}-${month}-${day} ${hours}:${minutes}:${seconds} ${timezone}`;

                    // Calculate relative time based on whether it's past or future
                    let relativeTime;
                    if (diffMs < 0) {
                        // Past time
                        relativeTime = formatPastTime(diffSec);
                    } else {
                        // Future time
                        relativeTime = formatFutureTime(diffSec);
                    }

                    element.textContent = relativeTime;
                    if (relativeTime !== 'indefinitely') {
                        element.setAttribute('title', exactDate);
                    }
                }
            });
        }

        // Run on initial load
        document.addEventListener('DOMContentLoaded', convertTimestampsToLocal);

        // Re-run after HTMX swaps content (for pagination, etc.)
        document.body.addEventListener('htmx:afterSwap', convertTimestampsToLocal);
    </script>
</body>
</html>
