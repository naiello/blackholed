<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blackholed DNS{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-gray-800 text-white shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <span class="text-xl font-bold">Blackholed DNS</span>
                </div>
                <div class="hidden md:flex space-x-4">
                    <a href="/" class="px-3 py-2 rounded-md hover:bg-gray-700 transition">Dashboard</a>
                    <a href="/clients" class="px-3 py-2 rounded-md hover:bg-gray-700 transition">Clients</a>
                    <a href="/sources" class="px-3 py-2 rounded-md hover:bg-gray-700 transition">Sources</a>
                </div>
                <div class="md:hidden">
                    <button id="mobile-menu-button" class="text-gray-300 hover:text-white focus:outline-none">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="mobile-menu" class="hidden md:hidden pb-4">
                <a href="/" class="block px-3 py-2 rounded-md hover:bg-gray-700 transition">Dashboard</a>
                <a href="/clients" class="block px-3 py-2 rounded-md hover:bg-gray-700 transition">Clients</a>
                <a href="/sources" class="block px-3 py-2 rounded-md hover:bg-gray-700 transition">Sources</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Simple mobile menu toggle
        document.getElementById('mobile-menu-button')?.addEventListener('click', function() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        });
    </script>
</body>
</html>
